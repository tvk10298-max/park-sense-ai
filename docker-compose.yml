version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: parksense_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - parksense-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parksense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - parksense-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: parksense_ml
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - ./ml:/app
      - ./data:/app/data
    networks:
      - parksense-net
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: parksense_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./data:/app/data
    networks:
      - parksense-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parksense_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - parksense-net
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: parksense_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - parksense-net
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:

networks:
  parksense-net:
    driver: bridge
